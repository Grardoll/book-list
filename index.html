<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書報費用統計系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-top: 0; }
        h3 { color: #555; margin-bottom: 15px; font-size: 1.1em; }
        
        .section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eef0f2; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        button { cursor: pointer; transition: 0.3s; background: #1a73e8; color: white; border: none; }
        button:hover { background: #1557b0; }
        
        .user-card { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; overflow: hidden; background: white; }
        .user-header { background: #e8f0fe; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .total-amount { color: #d93025; font-size: 1.1em; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-size: 0.9em; color: #666; }
        
        .status-unpaid { color: #d93025; background: #fce8e6; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; }
        .status-paid { color: #1e8e3e; background: #e6f4ea; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; }
        
        .btn-paid { background: #34a853; margin-right: 5px; }
        .btn-delete { background: #ea4335; }
        
        .tag { display: inline-block; background: #fff; border: 1px solid #ddd; padding: 5px 12px; margin: 3px; border-radius: 20px; font-size: 13px; }
        
        /* 查詢螢幕樣式 */
        .query-screen { background: #2c3e50; color: white; padding: 25px; border-radius: 8px; }
        .query-screen h3 { color: #ecf0f1; border-left: 4px solid #3498db; padding-left: 10px; }
        .unpaid-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .unpaid-name { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        .no-data { color: #bdc3c7; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 書報費用統計系統</h2>
    
    <!-- 1. 新增紀錄區 -->
    <div class="section">
        <h3>➕ 新增購買紀錄</h3>
        <div class="controls">
            <select id="userSelect"></select>
            <input type="text" id="bookInput" list="bookList" placeholder="輸入或選擇書名">
            <datalist id="bookList"></datalist>
            <input type="number" id="bookPrice" placeholder="金額" style="width: 80px;">
            <button onclick="addRecord()">確認新增</button>
        </div>
    </div>

    <!-- 2. 成員名單管理 -->
    <div class="section">
        <h3>👥 成員名單管理</h3>
        <div class="controls" style="margin-bottom: 15px;">
            <input type="text" id="newUserName" placeholder="新成員姓名">
            <button onclick="addNewUser()">加入名單</button>
        </div>
        <div id="userTags"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

    <!-- 3. 繳費紀錄顯示區 -->
    <h3>🔍 詳細購買明細 (依人員分類)</h3>
    <div id="displayArea"></div>

    <!-- 4. 未繳費查詢螢幕 -->
    <div class="query-screen">
        <h3>🚫 未繳費快速查詢</h3>
        <div style="margin-bottom: 15px;">
            <label>選擇書目：</label>
            <select id="queryBookSelect" onchange="renderUnpaidQuery()" style="background: #34495e; color: white; border: 1px solid #5d6d7e;">
                <option value="">-- 請選擇書名 --</option>
            </select>
        </div>
        <div id="unpaidResultArea">
            <p class="no-data">請選擇上方書名以查看未繳費名單</p>
        </div>
    </div>
</div>

<script>
    let users = ["林正義", "林陳雪紅", "於同心", "於簡瑋妤", "顧哲綸", "顧簡煜儒", "林筠倩", "魏家安", "李慧卿", "呂陳珮寧", "郭彥廷", "郭周瑞琪", "周洪明惠", "江桐郁", "江陳姱蓁", "鄭容朱", "俞勇", "俞葉蘭英", "申金秀麗", "翁勝利", "翁李世英", "陳黃素美", "曾蔡文惠", "李傳承", "劉怡心"];
    let books = [];
    let records = [];

    window.onload = function() {
        if(localStorage.getItem('sys_users')) users = JSON.parse(localStorage.getItem('sys_users'));
        if(localStorage.getItem('sys_books')) books = JSON.parse(localStorage.getItem('sys_books'));
        if(localStorage.getItem('sys_records')) records = JSON.parse(localStorage.getItem('sys_records'));
        renderAll();
    };

    function renderAll() {
        saveData();
        renderInputControls();
        renderDisplayArea();
        renderUserTags();
        renderQuerySelect();
        renderUnpaidQuery(); // 重新整理時同步更新查詢結果
    }

    function renderInputControls() {
        const uSelect = document.getElementById('userSelect');
        const bList = document.getElementById('bookList');
        uSelect.innerHTML = users.map(u => `<option value="${u}">${u}</option>`).join('');
        bList.innerHTML = books.map(b => `<option value="${b}">`).join('');
    }

    function renderQuerySelect() {
        const qSelect = document.getElementById('queryBookSelect');
        const currentVal = qSelect.value;
        qSelect.innerHTML = '<option value="">-- 請選擇書名 --</option>' + 
                            books.map(b => `<option value="${b}" ${b === currentVal ? 'selected' : ''}>${b}</option>`).join('');
    }

    function addRecord() {
        const user = document.getElementById('userSelect').value;
        const book = document.getElementById('bookInput').value.trim();
        const price = parseFloat(document.getElementById('bookPrice').value);
        if(!book || isNaN(price)) return alert("請填寫完整的書名與金額");
        if(!books.includes(book)) books.push(book);
        records.push({ userName: user, bookName: book, price: price, paid: false });
        document.getElementById('bookInput').value = "";
        document.getElementById('bookPrice').value = "";
        renderAll();
    }

    function renderDisplayArea() {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        const activeUsers = [...new Set(records.map(r => r.userName))];
        if(activeUsers.length === 0) {
            area.innerHTML = "<p style='color:#999; margin-bottom:20px;'>目前尚無購買紀錄</p>";
            return;
        }
        activeUsers.forEach(user => {
            const userRecords = records.filter(r => r.userName === user);
            const total = userRecords.reduce((sum, r) => sum + r.price, 0);
            const unpaidTotal = userRecords.filter(r => !r.paid).reduce((sum, r) => sum + r.price, 0);
            let html = `<div class="user-card"><div class="user-header"><span>👤 ${user}</span><span class="total-amount">總計：$${total} (未繳：$${unpaidTotal})</span></div><table><thead><tr><th width="40%">書名</th><th width="20%">金額</th><th width="15%">狀態</th><th width="25%">操作</th></tr></thead><tbody>`;
            records.forEach((r, index) => {
                if(r.userName === user) {
                    html += `<tr><td>${r.bookName}</td><td>$${r.price}</td><td><span class="${r.paid ? 'status-paid' : 'status-unpaid'}">${r.paid ? '已繳' : '未繳'}</span></td><td><button class="btn-paid" onclick="togglePaid(${index})">${r.paid ? '設為未繳' : '確認繳費'}</button><button class="btn-delete" onclick="deleteRecord(${index})">刪除</button></td></tr>`;
                }
            });
            html += `</tbody></table></div>`;
            area.innerHTML += html;
        });
    }

    // 新增：未繳費查詢邏輯
    function renderUnpaidQuery() {
        const selectedBook = document.getElementById('queryBookSelect').value;
        const resultArea = document.getElementById('unpaidResultArea');
        if (!selectedBook) {
            resultArea.innerHTML = '<p class="no-data">請選擇上方書名以查看未繳費名單</p>';
            return;
        }
        const unpaidUsers = records
            .filter(r => r.bookName === selectedBook && !r.paid)
            .map(r => r.userName);
        const uniqueUnpaid = [...new Set(unpaidUsers)];
        if (uniqueUnpaid.length === 0) {
            resultArea.innerHTML = '<p style="color:#2ecc71;">恭喜！此書目所有人都已完成繳費 🎉</p>';
        } else {
            resultArea.innerHTML = '<p>以下成員尚未繳費：</p><div class="unpaid-list">' + 
                                   uniqueUnpaid.map(name => `<div class="unpaid-name">${name}</div>`).join('') + 
                                   '</div>';
        }
    }

    function togglePaid(index) {
        records[index].paid = !records[index].paid;
        renderAll();
    }

    function deleteRecord(index) {
        if(confirm("確定要刪除這筆書目嗎？")) {
            records.splice(index, 1);
            renderAll();
        }
    }

    function addNewUser() {
        const name = document.getElementById('newUserName').value.trim();
        if(name && !users.includes(name)) {
            users.push(name);
            document.getElementById('newUserName').value = "";
            renderAll();
        }
    }

    function removeUser(name) {
        if(confirm(`確定要從名單刪除 ${name} 嗎？`)) {
            users = users.filter(u => u !== name);
            renderAll();
        }
    }

    function renderUserTags() {
        const div = document.getElementById('userTags');
        div.innerHTML = users.map(u => `<span class="tag">${u} <span style="cursor:pointer;color:red;margin-left:5px" onclick="removeUser('${u}')">×</span></span>`).join('');
    }

    function saveData() {
        localStorage.setItem('sys_users', JSON.stringify(users));
        localStorage.setItem('sys_books', JSON.stringify(books));
        localStorage.setItem('sys_records', JSON.stringify(records));
    }
</script>

</body>
</html>
