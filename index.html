<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書報費用統計系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-top: 0; text-align: center; }
        h3 { color: #555; margin-bottom: 15px; font-size: 1.05em; border-left: 4px solid #1a73e8; padding-left: 10px; }
        
        .top-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .flex-item { flex: 1; min-width: 350px; background: #f8f9fa; padding: 18px; border-radius: 8px; border: 1px solid #eef0f2; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        
        input, select, button, textarea { padding: 9px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        textarea { resize: vertical; height: 38px; flex: 1; min-width: 150px; }
        button { cursor: pointer; transition: 0.3s; background: #1a73e8; color: white; border: none; }
        button:hover { background: #1557b0; }
        
        /* 查詢螢幕 */
        .query-screen { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }
        .query-screen h3 { color: #ecf0f1; border-left: 4px solid #3498db; }
        .stats-bar { display: flex; gap: 20px; margin: 15px 0; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 6px; flex-wrap: wrap; }
        .stats-val { font-weight: bold; color: #f1c40f; font-size: 1.2em; margin: 0 5px; }
        .unpaid-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .unpaid-name { background: #e74c3c; color: white; padding: 6px 12px; border-radius: 5px; font-weight: bold; }

        /* 明細表格 */
        .user-card { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; overflow: hidden; background: white; }
        .user-header { background: #e8f0fe; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .total-amount { color: #d93025; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; overflow: hidden; text-overflow: ellipsis; }
        th { background: #fafafa; font-size: 0.9em; color: #666; }
        
        .btn-paid { background: #34a853; }
        .btn-delete { background: #ea4335; }
        .tag { display: inline-block; background: #fff; border: 1px solid #ddd; padding: 4px 10px; margin: 2px; border-radius: 15px; font-size: 12px; }

        /* 同步區 */
        .sync-section { margin-top: 50px; padding: 20px; background: #fff3e0; border-radius: 8px; border: 1px dashed #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 書報費用統計系統</h2>
    
    <div class="top-row">
        <div class="flex-item">
            <h3>➕ 新增購買紀錄</h3>
            <div class="controls">
                <select id="userSelect" style="width: 120px;"></select>
                <input type="text" id="bookInput" list="bookList" placeholder="書名" style="width: 150px;" oninput="autoFillPrice()">
                <datalist id="bookList"></datalist>
                <input type="number" id="bookPrice" placeholder="單價" style="width: 70px;">
                <input type="number" id="bookQty" value="1" min="1" placeholder="數量" style="width: 60px;">
                <textarea id="bookNote" placeholder="備註"></textarea>
                <button onclick="addRecord()">新增</button>
            </div>
        </div>

        <div class="flex-item">
            <h3>👥 名單管理</h3>
            <div class="controls" style="margin-bottom: 10px;">
                <input type="text" id="newUserName" placeholder="新成員姓名" style="flex: 1;">
                <button onclick="addNewUser()">加入</button>
            </div>
            <div id="userTags"></div>
        </div>
    </div>

    <div class="query-screen">
        <h3>🚫 未繳費快速查詢</h3>
        <div style="margin-bottom: 12px;">
            <select id="queryBookSelect" onchange="renderUnpaidQuery()" style="background: #34495e; color: white; border: 1px solid #5d6d7e; min-width: 200px;">
                <option value="">-- 請選擇書名 --</option>
            </select>
        </div>
        <div id="unpaidResultArea"></div>
    </div>

    <h3>🔍 詳細購買明細 (依人員分類)</h3>
    <div id="displayArea"></div>

    <!-- 跨裝置同步區 -->
    <div class="sync-section">
        <h3>同步與備份 (解決手機電腦不同步問題)</h3>
        <p style="font-size: 0.9em; color: #666;">由於 GitHub Pages 是將資料存於瀏覽器中，如需換裝置，請先按「複製資料代碼」，再到另一個裝置「貼上並還原」。</p>
        <div class="controls">
            <button onclick="copyDataText()" style="background: #fb8c00;">1. 複製資料代碼</button>
            <input type="text" id="importInput" placeholder="在此貼上代碼..." style="flex: 1;">
            <button onclick="importData()" style="background: #ff5722;">2. 貼上並還原資料</button>
        </div>
    </div>
</div>

<script>
    let users = ["林正義", "林陳雪紅", "於同心", "於簡瑋妤", "顧哲綸", "顧簡煜儒", "林筠倩", "魏家安", "李慧卿", "呂陳珮寧", "郭彥廷", "郭周瑞琪", "周洪明惠", "江桐郁", "江陳姱蓁", "鄭容朱", "俞勇", "俞葉蘭英", "申金秀麗", "翁勝利", "翁李世英", "陳黃素美", "曾蔡文惠", "李傳承", "劉怡心"];
    let records = [];

    window.onload = function() {
        // 嘗試讀取舊版與新版資料，防止修改代碼後資料遺失
        const oldRecords = localStorage.getItem('sys_records');
        const oldUsers = localStorage.getItem('sys_users');
        if(oldRecords) records = JSON.parse(oldRecords);
        if(oldUsers) users = JSON.parse(oldUsers);
        renderAll();
    };

    function renderAll() {
        saveData();
        renderInputControls();
        renderDisplayArea();
        renderUserTags();
        renderQuerySelect();
        renderUnpaidQuery();
    }

    function getActiveBooks() {
        return [...new Set(records.map(r => r.bookName))];
    }

    function autoFillPrice() {
        const inputBook = document.getElementById('bookInput').value.trim();
        const lastRecord = records.slice().reverse().find(r => r.bookName === inputBook);
        if (lastRecord) document.getElementById('bookPrice').value = lastRecord.price;
    }

    function renderInputControls() {
        document.getElementById('userSelect').innerHTML = users.map(u => `<option value="${u}">${u}</option>`).join('');
        document.getElementById('bookList').innerHTML = getActiveBooks().map(b => `<option value="${b}">`).join('');
    }

    function addRecord() {
        const user = document.getElementById('userSelect').value;
        const book = document.getElementById('bookInput').value.trim();
        const price = parseFloat(document.getElementById('bookPrice').value);
        const qty = parseInt(document.getElementById('bookQty').value) || 1;
        const note = document.getElementById('bookNote').value.trim();
        if(!book || isNaN(price)) return alert("請填寫書名與金額");
        
        records.push({ userName: user, bookName: book, price: price, qty: qty, note: note, paid: false });
        document.getElementById('bookInput').value = "";
        document.getElementById('bookPrice').value = "";
        document.getElementById('bookQty').value = "1";
        document.getElementById('bookNote').value = "";
        renderAll();
    }

    function renderDisplayArea() {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        const activeUsers = [...new Set(records.map(r => r.userName))];
        if(activeUsers.length === 0) {
            area.innerHTML = "<p style='color:#999;'>尚無購買紀錄</p>";
            return;
        }
        activeUsers.forEach(user => {
            const userRecords = records.filter(r => r.userName === user);
            const total = userRecords.reduce((sum, r) => sum + (r.price * (r.qty || 1)), 0);
            const unpaidTotal = userRecords.filter(r => !r.paid).reduce((sum, r) => sum + (r.price * (r.qty || 1)), 0);
            
            let html = `<div class="user-card"><div class="user-header"><span>👤 ${user}</span><span class="total-amount">總計：$${total} (未繳：$${unpaidTotal})</span></div><table><thead><tr><th width="25%">書名</th><th width="10%">單價</th><th width="10%">數量</th><th width="25%">備註</th><th width="10%">狀態</th><th width="20%">操作</th></tr></thead><tbody>`;
            
            records.forEach((r, index) => {
                if(r.userName === user) {
                    html += `<tr><td>${r.bookName}</td><td>$${r.price}</td><td>${r.qty || 1}</td><td style="font-size:0.85em; color:#666;">${r.note || '-'}</td><td><span class="${r.paid ? 'status-paid' : 'status-unpaid'}">${r.paid ? '已繳' : '未繳'}</span></td><td><button class="btn-paid" onclick="togglePaid(${index})">繳費</button> <button class="btn-delete" onclick="deleteRecord(${index})">刪」</button></td></tr>`;
                }
            });
            area.innerHTML += html + `</tbody></table></div>`;
        });
    }

    // 備份功能
    function copyDataText() {
        const data = JSON.stringify({ u: users, r: records });
        const blob = new Blob([data], {type: 'text/plain'});
        const tempInput = document.createElement("input");
        document.body.appendChild(tempInput);
        tempInput.value = data;
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert("資料已複製！請到另一個裝置貼上。");
    }

    function importData() {
        const input = document.getElementById('importInput').value;
        try {
            const parsed = JSON.parse(input);
            if(parsed.u && parsed.r) {
                users = parsed.u;
                records = parsed.r;
                renderAll();
                alert("資料還原成功！");
                document.getElementById('importInput').value = "";
            }
        } catch(e) { alert("代碼錯誤，請重新複製。"); }
    }

    // (以下為原本的邏輯，保留 togglePaid, deleteRecord, renderUnpaidQuery, addNewUser, saveData 等內容)
    function renderQuerySelect() {
        const qSelect = document.getElementById('queryBookSelect');
        const currentVal = qSelect.value;
        const activeBooks = getActiveBooks();
        qSelect.innerHTML = '<option value="">-- 請選擇書名 --</option>' + activeBooks.map(b => `<option value="${b}" ${b === currentVal ? 'selected' : ''}>${b}</option>`).join('');
    }

    function renderUnpaidQuery() {
        const selectedBook = document.getElementById('queryBookSelect').value;
        const resultArea = document.getElementById('unpaidResultArea');
        if (!selectedBook) { resultArea.innerHTML = '<p class="no-data">請選擇書名</p>'; return; }
        const bookRecords = records.filter(r => r.bookName === selectedBook);
        const unpaidRecords = bookRecords.filter(r => !r.paid);
        const unpaidAmount = unpaidRecords.reduce((sum, r) => sum + (r.price * (r.qty || 1)), 0);
        const unpaidUsers = [...new Set(unpaidRecords.map(r => r.userName))];
        resultArea.innerHTML = `<div class="stats-bar"><div>訂購人數：<span class="stats-val">${bookRecords.length}</span></div><div>待收金額：<span class="stats-val">$${unpaidAmount}</span></div></div>` + 
                                (unpaidUsers.length ? `<div class="unpaid-list">${unpaidUsers.map(name => `<div class="unpaid-name">${name}</div>`).join('')}</div>` : '<p>✅ 已繳清</p>');
    }

    function togglePaid(i) { records[i].paid = !records[i].paid; renderAll(); }
    function deleteRecord(i) { if(confirm("確定刪除？")) { records.splice(i, 1); renderAll(); } }
    function addNewUser() { const n = document.getElementById('newUserName').value.trim(); if(n && !users.includes(n)) { users.push(n); renderAll(); } }
    function removeUser(n) { if(confirm("刪除成員？")) { users = users.filter(u => u !== n); renderAll(); } }
    function renderUserTags() { document.getElementById('userTags').innerHTML = users.map(u => `<span class="tag">${u} <span style="color:red;cursor:pointer" onclick="removeUser('${u}')">×</span></span>`).join(''); }
    function saveData() { localStorage.setItem('sys_users', JSON.stringify(users)); localStorage.setItem('sys_records', JSON.stringify(records)); }
</script>

</body>
</html>
