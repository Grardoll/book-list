<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書報費用統計系統</title>
    <style>
        :root {
            --primary-color: #5d737e; /* 莫蘭迪藍 */
            --accent-color: #c9ada7;  /* 藕粉色 */
            --bg-color: #f7f9fb;
            --text-color: #4a4a4a;
            --danger-color: #e5989b;
        }

        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 15px; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 頂部同步區 - 縮小置頂 */
        .sync-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #f1f3f5; padding: 8px 15px; border-radius: 30px; margin-bottom: 20px; font-size: 13px; border: 1px solid #dee2e6; }
        .sync-bar input { flex: 1; border: none; background: transparent; padding: 4px; outline: none; color: #666; font-size: 12px; }
        .sync-btn { padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--primary-color); background: white; color: var(--primary-color); cursor: pointer; transition: 0.3s; }
        .sync-btn:hover { background: var(--primary-color); color: white; }

        h2 { color: var(--primary-color); font-weight: 300; text-align: center; letter-spacing: 2px; margin-bottom: 25px; }
        h3 { font-size: 0.95em; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-left: 3px solid var(--accent-color); padding-left: 10px; }

        /* 輸入佈局 */
        .top-row { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .flex-box { flex: 1; min-width: 320px; padding: 15px; border-radius: 10px; background: #fafafa; border: 1px solid #f0f0f0; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        
        .input-group { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: white; }
        .input-label { background: #f0f0f0; padding: 6px 10px; font-size: 12px; color: #777; border-right: 1px solid #ddd; }
        input, select, button { padding: 8px; border: none; font-size: 13px; outline: none; }
        
        .btn-add { background: var(--primary-color); color: white; border-radius: 6px; padding: 8px 20px; }
        .btn-add:hover { opacity: 0.8; }

        /* 查詢區 */
        .query-screen { background: var(--primary-color); color: white; padding: 18px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(93, 115, 126, 0.2); }
        .query-screen select { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; margin-left: 10px; }
        .stats-bar { display: flex; gap: 30px; margin: 10px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .stats-val { color: #ffe66d; font-weight: bold; font-size: 1.1em; }
        .unpaid-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .unpaid-name { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 4px; font-size: 12px; }

        /* 明細卡片 */
        .user-card { margin-bottom: 25px; border: 1px solid #eee; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .user-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .user-header { background: #fcfcfc; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .user-name { font-weight: bold; color: var(--primary-color); }
        .btn-batch-delete { font-size: 11px; background: var(--danger-color); color: white; border-radius: 4px; padding: 4px 8px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; color: #999; font-weight: 400; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #f9f9f9; }
        .note-input { width: 95%; border: 1px solid transparent; background: transparent; font-size: 12px; color: #888; }
        .note-input:focus { border-bottom: 1px solid var(--accent-color); outline: none; }
        
        .paid-tag { font-size: 11px; padding: 2px 6px; border-radius: 3px; }
        .status-0 { background: #fff0f0; color: #e5989b; } /* 未繳 */
        .status-1 { background: #f0fff4; color: #6fb98f; } /* 已繳 */

        .btn-action { font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; background: #eee; margin-left: 3px; }
        .tag { display: inline-block; background: #f1f3f5; padding: 3px 10px; margin: 2px; border-radius: 12px; font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <!-- 頂部同步區 -->
    <div class="sync-bar">
        <span>🔄 同步備份:</span>
        <input type="text" id="importInput" placeholder="在此貼上代碼並按右側還原">
        <button class="sync-btn" onclick="importData()">還原資料</button>
        <button class="sync-btn" onclick="copyDataText()">複製代碼</button>
    </div>

    <h2>書報費用統計系統</h2>
    
    <div class="top-row">
        <!-- 新增紀錄 -->
        <div class="flex-box">
            <h3>➕ 新增購買</h3>
            <div class="controls">
                <div class="input-group"><div class="input-label">人</div><select id="userSelect" style="width: 80px;"></select></div>
                <div class="input-group"><div class="input-label">書</div><input type="text" id="bookInput" list="bookList" oninput="autoFillPrice()" style="width: 100px;"><datalist id="bookList"></datalist></div>
                <div class="input-group"><div class="input-label">金</div><input type="number" id="bookPrice" style="width: 60px;"></div>
                <div class="input-group"><div class="input-label">量</div><input type="number" id="bookQty" value="1" style="width: 40px;"></div>
                <button class="btn-add" onclick="addRecord()">新增</button>
            </div>
        </div>

        <!-- 名單管理 -->
        <div class="flex-box">
            <h3>👥 名單</h3>
            <div class="controls" style="margin-bottom: 8px;">
                <input type="text" id="newUserName" placeholder="新姓名" style="border:1px solid #ddd; border-radius:4px; width:100px;">
                <button class="sync-btn" onclick="addNewUser()">加入</button>
            </div>
            <div id="userTags"></div>
        </div>
    </div>

    <!-- 快速查詢 -->
    <div class="query-screen">
        <div style="display:flex; align-items:center; justify-content: space-between;">
            <span style="font-size: 1.1em; letter-spacing: 1px;">🚫 未繳費查詢</span>
            <select id="queryBookSelect" onchange="renderUnpaidQuery()"><option value="">-- 請選擇書名 --</option></select>
        </div>
        <div id="unpaidResultArea"><p style="font-size:12px; color: rgba(255,255,255,0.5); margin-top:10px;">請選取書目以查看統計...</p></div>
    </div>

    <h3>🔍 購買明細</h3>
    <div id="displayArea"></div>
</div>

<script>
    let users = ["林正義", "林陳雪紅", "於同心", "於簡瑋妤", "顧哲綸", "顧簡煜儒", "林筠倩", "魏家安", "李慧卿", "呂陳珮寧", "郭彥廷", "郭周瑞琪", "周洪明惠", "江桐郁", "江陳姱蓁", "鄭容朱", "俞勇", "俞葉蘭英", "申金秀麗", "翁勝利", "翁李世英", "陳黃素美", "曾蔡文惠", "李傳承", "劉怡心"];
    let records = [];

    window.onload = function() {
        if(localStorage.getItem('sys_users')) users = JSON.parse(localStorage.getItem('sys_users'));
        if(localStorage.getItem('sys_records')) records = JSON.parse(localStorage.getItem('sys_records'));
        renderAll();
    };

    function renderAll() {
        saveData();
        renderInputControls();
        renderDisplayArea();
        renderUserTags();
        renderQuerySelect();
        renderUnpaidQuery();
    }

    function getActiveBooks() { return [...new Set(records.map(r => r.bookName))]; }

    function autoFillPrice() {
        const inputBook = document.getElementById('bookInput').value.trim();
        const last = records.slice().reverse().find(r => r.bookName === inputBook);
        if (last) document.getElementById('bookPrice').value = last.price;
    }

    function renderInputControls() {
        document.getElementById('userSelect').innerHTML = users.map(u => `<option value="${u}">${u}</option>`).join('');
        document.getElementById('bookList').innerHTML = getActiveBooks().map(b => `<option value="${b}">`).join('');
    }

    function addRecord() {
        const user = document.getElementById('userSelect').value;
        const book = document.getElementById('bookInput').value.trim();
        const price = parseFloat(document.getElementById('bookPrice').value);
        const qty = parseInt(document.getElementById('bookQty').value) || 1;
        if(!book || isNaN(price)) return alert("請填寫書名與金額");
        records.push({ id: Date.now() + Math.random(), userName: user, bookName: book, price: price, qty: qty, note: "", paid: false });
        document.getElementById('bookInput').value = "";
        document.getElementById('bookPrice').value = "";
        document.getElementById('bookQty').value = "1";
        renderAll();
    }

    // 批次刪除
    function deleteSelected(userName) {
        const checkboxes = document.querySelectorAll(`.chk-${userName}:checked`);
        if(checkboxes.length === 0) return alert("請先勾選要刪除的項目");
        if(confirm(`確定要刪除這 ${checkboxes.length} 筆紀錄嗎？`)) {
            const idsToDelete = Array.from(checkboxes).map(cb => parseFloat(cb.value));
            records = records.filter(r => !idsToDelete.includes(r.id));
            renderAll();
        }
    }

    function renderDisplayArea() {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        const activeUsers = [...new Set(records.map(r => r.userName))];
        if(activeUsers.length === 0) { area.innerHTML = "<p style='color:#ccc; text-align:center;'>尚無資料</p>"; return; }
        
        activeUsers.forEach(user => {
            const userRecords = records.filter(r => r.userName === user);
            const unpaidTotal = userRecords.filter(r => !r.paid).reduce((sum, r) => sum + (r.price * r.qty), 0);
            
            let html = `
                <div class="user-card">
                    <div class="user-header">
                        <span class="user-name">👤 ${user} <small style="font-weight:normal; color:#999; margin-left:10px;">待繳: $${unpaidTotal}</small></span>
                        <button class="btn-batch-delete" onclick="deleteSelected('${user}')">一鍵刪除選中</button>
                    </div>
                    <table>
                        <thead><tr><th width="30"></th><th>書名</th><th width="60">單價</th><th width="40">量</th><th>備註</th><th width="60">狀態</th><th width="80">操作</th></tr></thead>
                        <tbody>`;
            
            records.forEach((r, i) => {
                if(r.userName === user) {
                    html += `
                        <tr>
                            <td><input type="checkbox" class="chk-${user}" value="${r.id}"></td>
                            <td>${r.bookName}</td>
                            <td>$${r.price}</td>
                            <td>${r.qty}</td>
                            <td><input type="text" class="note-input" value="${r.note || ''}" placeholder="..." onchange="updateNote(${i}, this.value)"></td>
                            <td><span class="paid-tag ${r.paid ? 'status-1' : 'status-0'}">${r.paid ? '已繳' : '未繳'}</span></td>
                            <td><span class="btn-action" onclick="togglePaid(${i})">繳費</span><span class="btn-action" style="color:#e5989b" onclick="deleteSingle(${i})">刪</span></td>
                        </tr>`;
                }
            });
            area.innerHTML += html + `</tbody></table></div>`;
        });
    }

    function renderUnpaidQuery() {
        const selectedBook = document.getElementById('queryBookSelect').value;
        const resultArea = document.getElementById('unpaidResultArea');
        if (!selectedBook) return;
        const bookRecords = records.filter(r => r.bookName === selectedBook);
        const unpaid = bookRecords.filter(r => !r.paid);
        const unpaidAmount = unpaid.reduce((sum, r) => sum + (r.price * r.qty), 0);
        const unpaidUsers = [...new Set(unpaid.map(r => r.userName))];
        resultArea.innerHTML = `
            <div class="stats-bar">
                <div>訂購：<span class="stats-val">${bookRecords.length}</span></div>
                <div>待收：<span class="stats-val">$${unpaidAmount}</span></div>
            </div>
            ${unpaidUsers.length ? `<div class="unpaid-list">${unpaidUsers.map(name => `<div class="unpaid-name">${name}</div>`).join('')}</div>` : '<p style="font-size:12px;">✅ 項目已結清</p>'}
        `;
    }

    function updateNote(i, v) { records[i].note = v; saveData(); }
    function togglePaid(i) { records[i].paid = !records[i].paid; renderAll(); }
    function deleteSingle(i) { if(confirm("刪除此筆？")) { records.splice(i, 1); renderAll(); } }
    function renderQuerySelect() {
        const qSelect = document.getElementById('queryBookSelect');
        const val = qSelect.value;
        const active = getActiveBooks();
        qSelect.innerHTML = '<option value="">-- 請選擇書名 --</option>' + active.map(b => `<option value="${b}" ${b === val ? 'selected' : ''}>${b}</option>`).join('');
    }
    function addNewUser() { const n = document.getElementById('newUserName').value.trim(); if(n && !users.includes(n)) { users.push(n); renderAll(); } }
    function removeUser(n) { if(confirm("刪除成員？")) { users = users.filter(u => u !== n); renderAll(); } }
    function renderUserTags() { document.getElementById('userTags').innerHTML = users.map(u => `<span class="tag">${u} <span style="color:#e5989b;cursor:pointer" onclick="removeUser('${u}')">×</span></span>`).join(''); }
    function saveData() { localStorage.setItem('sys_users', JSON.stringify(users)); localStorage.setItem('sys_records', JSON.stringify(records)); }
    function copyDataText() {
        const data = JSON.stringify({ u: users, r: records });
        navigator.clipboard.writeText(data).then(() => alert("代碼已複製到剪貼簿！"));
    }
    function importData() {
        const input = document.getElementById('importInput').value;
        try {
            const parsed = JSON.parse(input);
            if(parsed.u && parsed.r) { users = parsed.u; records = parsed.r; renderAll(); alert("資料還原成功！"); document.getElementById('importInput').value = ""; }
        } catch(e) { alert("代碼格式錯誤！"); }
    }
</script>

</body>
</html>
